<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 240px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #faf7f0;
      color: #1a1a1a;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px;
      letter-spacing: 0.5px;
    }
    p.sub {
      margin: 0 0 16px;
      font-size: 11px;
      color: #8a857c;
    }
    button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
      padding: 11px 14px;
      margin-bottom: 8px;
      border: 1px solid #e0dacb;
      border-radius: 10px;
      background: #fff;
      color: #1a1a1a;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .12s ease;
    }
    button:hover { box-shadow: 0 3px 10px rgba(0,0,0,.08); }
    button:active { transform: scale(.98); }
    button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .ico { font-size: 16px; line-height: 1; }
    .count {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: #8a857c;
      background: #f0ece1;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .hint { font-size: 10.5px; color: #a8a296; margin-top: 4px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Stampmark</h1>
  <p class="sub">Recorta el navegador con forma de estampa.</p>

  <button id="capture" class="primary">
    <span class="ico">✂️</span>
    <span>Capturar estampa</span>
  </button>

  <button id="moodboard">
    <span class="ico">🖼️</span>
    <span>Abrir moodboard</span>
    <span class="count" id="count">0</span>
  </button>

  <p class="hint">Arrastra para seleccionar un área. Se copia al portapapeles y se guarda en el moodboard.</p>

  <script src="popup.js"></script>
</body>
</html>
